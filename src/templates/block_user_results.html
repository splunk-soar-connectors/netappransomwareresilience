{% extends 'base/header.html' %}
{% block title %}Block User Results{% endblock %}
{% block widget_content %}
  <style>
    .block-user-summary {
        margin-bottom: 20px;
        padding: 12px;
        border-left: 4px solid;
        border-radius: 4px;
    }
    .block-user-summary.success {
        border-left-color: #28a745;
        background-color: rgba(40, 167, 69, 0.1);
    }
    .status-icon {
        font-size: 24px;
        margin-right: 10px;
    }
    .empty-state {
        text-align: center;
        padding: 40px 20px;
    }
    .empty-state-icon {
        font-size: 48px;
        margin-bottom: 16px;
    }
  </style>
  <div>
    {% if message %}
      <div class="block-user-summary success">
        <span class="status-icon">✓</span>
        <strong>{{ message }}</strong>
      </div>
    {% else %}
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <p>No result message available.</p>
      </div>
    {% endif %}
  </div>
{% endblock %}
